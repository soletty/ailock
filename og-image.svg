<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#04060d"/>
      <stop offset="100%" stop-color="#080d1a"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#4db8ff"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="glow-red" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#ff2d55" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ff2d55" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-cyan" cx="50%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow-red)"/>
  <rect width="1200" height="630" fill="url(#glow-cyan)"/>

  <!-- Grid lines -->
  <g stroke="#4db8ff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="80" y1="0" x2="80" y2="630"/>
    <line x1="160" y1="0" x2="160" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="320" y1="0" x2="320" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="560" y1="0" x2="560" y2="630"/>
    <line x1="640" y1="0" x2="640" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="880" y1="0" x2="880" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1040" y1="0" x2="1040" y2="630"/>
    <line x1="1120" y1="0" x2="1120" y2="630"/>
  </g>

  <!-- Border -->
  <rect x="40" y="40" width="1120" height="550" rx="16" fill="none" stroke="#162038" stroke-width="1.5"/>

  <!-- Badge -->
  <rect x="80" y="80" width="300" height="36" rx="18" fill="rgba(255,45,85,0.1)" stroke="rgba(255,45,85,0.3)" stroke-width="1"/>
  <circle cx="106" cy="98" r="5" fill="#ff2d55">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="122" y="104" font-family="'JetBrains Mono', monospace" font-size="13" fill="#ff2d55" letter-spacing="2">SUPPLY CHAIN SECURITY</text>

  <!-- Lock icon -->
  <text x="80" y="230" font-size="70" font-family="system-ui">🔐</text>

  <!-- Main title -->
  <text x="80" y="295" font-family="'Chakra Petch', sans-serif" font-size="82" font-weight="700" fill="#dde6f5" letter-spacing="-2">ailock</text>

  <!-- Gradient title line -->
  <defs>
    <linearGradient id="grad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <text x="80" y="360" font-family="'Chakra Petch', sans-serif" font-size="36" font-weight="400" fill="url(#grad2)">Cryptographic lockfile for AI/LLM dependencies</text>

  <!-- Subtitle -->
  <text x="80" y="415" font-family="'Chakra Petch', sans-serif" font-size="24" fill="#7a90b8" font-weight="300">
    Catches mid-version package tampering before it hits prod
  </text>

  <!-- Code pill -->
  <rect x="80" y="445" width="370" height="52" rx="10" fill="#0c1224" stroke="#1e2e50" stroke-width="1.5"/>
  <text x="108" y="478" font-family="'JetBrains Mono', monospace" font-size="22" fill="#3d4f70">$ </text>
  <text x="138" y="478" font-family="'JetBrains Mono', monospace" font-size="22" fill="#00d4ff">pip install ailock</text>

  <!-- Right side: terminal output -->
  <rect x="700" y="80" width="460" height="480" rx="12" fill="#02040a" stroke="#1e2e50" stroke-width="1"/>

  <!-- Terminal header -->
  <rect x="700" y="80" width="460" height="44" rx="12" fill="#0c1224" stroke="#1e2e50" stroke-width="1"/>
  <rect x="700" y="103" width="460" height="21" fill="#0c1224"/>
  <circle cx="730" cy="102" r="6" fill="#ff5f57"/>
  <circle cx="752" cy="102" r="6" fill="#febc2e"/>
  <circle cx="774" cy="102" r="6" fill="#28c840"/>

  <!-- Terminal content -->
  <text x="722" y="155" font-family="'JetBrains Mono', monospace" font-size="13" fill="#3d4f70">$ ailock verify</text>

  <text x="722" y="195" font-family="'JetBrains Mono', monospace" font-size="12" fill="#7a90b8">Verifying 14 packages...</text>
  <text x="722" y="220" font-family="'JetBrains Mono', monospace" font-size="12" fill="#7a90b8">  ✓  anthropic 0.39.0</text>
  <text x="722" y="242" font-family="'JetBrains Mono', monospace" font-size="12" fill="#7a90b8">  ✓  langchain-core 0.3.1</text>
  <text x="722" y="264" font-family="'JetBrains Mono', monospace" font-size="12" fill="#7a90b8">  ✓  openai 1.52.0</text>

  <!-- Alert box -->
  <rect x="712" y="278" width="436" height="120" rx="8" fill="rgba(255,45,85,0.08)" stroke="rgba(255,45,85,0.3)" stroke-width="1"/>
  <text x="730" y="305" font-family="'JetBrains Mono', monospace" font-size="14" fill="#ff2d55" font-weight="bold">🚨 ATTACK DETECTED</text>
  <text x="730" y="328" font-family="'JetBrains Mono', monospace" font-size="11" fill="#ff2d55">litellm 1.82.7 — hash changed!</text>
  <text x="730" y="350" font-family="'JetBrains Mono', monospace" font-size="10" fill="#ff6b6b">- sha256:a7c3...  (your lockfile)</text>
  <text x="730" y="370" font-family="'JetBrains Mono', monospace" font-size="10" fill="#ff2d55">+ sha256:d4e9...  (PyPI ← MALICIOUS)</text>
  <text x="730" y="392" font-family="'JetBrains Mono', monospace" font-size="10" fill="#ff2d55">Deployment BLOCKED ✋</text>

  <text x="722" y="435" font-family="'JetBrains Mono', monospace" font-size="12" fill="#7a90b8">$ ailock audit</text>
  <text x="722" y="460" font-family="'JetBrains Mono', monospace" font-size="12" fill="#00e5a0">✓  13 packages clean</text>
  <text x="722" y="482" font-family="'JetBrains Mono', monospace" font-size="12" fill="#ff2d55">✗  litellm 1.82.7 — known-bad</text>
  <text x="722" y="504" font-family="'JetBrains Mono', monospace" font-size="12" fill="#7a90b8">Exit code: 1</text>

  <!-- Footer -->
  <text x="80" y="560" font-family="'Chakra Petch', sans-serif" font-size="18" fill="#3d4f70">midnightrun.ai/ailock  ·  open source  ·  pip install ailock</text>
</svg>
