name: AI/LLM Supply Chain Security

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run daily at 6 AM UTC — catches attacks on packages you already have locked
    - cron: "0 6 * * *"

jobs:
  ailock:
    name: Verify AI/LLM Package Integrity
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install ailock
        run: pip install ailock

      # If .ailock doesn't exist yet, generate it and fail so you commit it
      - name: Check for lockfile
        run: |
          if [ ! -f .ailock ]; then
            echo "::warning::No .ailock file found. Generating one now."
            ailock generate
            echo ""
            echo "==========================================="
            echo "  ACTION REQUIRED: Commit the .ailock file"
            echo "==========================================="
            echo ""
            echo "Run: git add .ailock && git commit -m 'chore: add ailock lockfile'"
            exit 1
          fi

      - name: Verify package integrity
        id: verify
        run: ailock verify --json-output > ailock-verify.json
        continue-on-error: true

      - name: Audit against known-bad database
        id: audit
        run: ailock audit --json-output > ailock-audit.json
        continue-on-error: true

      - name: Parse and report results
        run: |
          echo "## ailock Security Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Parse verify results
          TAMPERED=$(cat ailock-verify.json | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('tampered', 0))" 2>/dev/null || echo "0")
          VERIFY_OK=$(cat ailock-verify.json | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('ok', 0))" 2>/dev/null || echo "0")

          if [ "$TAMPERED" -gt "0" ]; then
            echo "### 🚨 INTEGRITY VIOLATION — $TAMPERED package(s) tampered" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Package | Version | Issue |" >> $GITHUB_STEP_SUMMARY
            echo "|---------|---------|-------|" >> $GITHUB_STEP_SUMMARY
            cat ailock-verify.json | python3 -c "
          import json,sys
          d = json.load(sys.stdin)
          for p in d.get('packages', []):
            if p['status'] == 'tampered':
              print(f'| {p[\"name\"]} | {p[\"version\"]} | {p[\"message\"]} |')
          " >> $GITHUB_STEP_SUMMARY
          else
            echo "### ✅ Verify — $VERIFY_OK packages clean" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # Parse audit results
          HITS=$(cat ailock-audit.json | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('hits', 0))" 2>/dev/null || echo "0")

          if [ "$HITS" -gt "0" ]; then
            echo "### 🚨 AUDIT FAILED — $HITS known-bad package(s) detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat ailock-audit.json | python3 -c "
          import json,sys
          d = json.load(sys.stdin)
          print('| Package | Version | Severity | Description |')
          print('|---------|---------|----------|-------------|')
          for m in d.get('matches', []):
            print(f'| {m[\"package\"]} | {m[\"version\"]} | {m[\"severity\"]} | {m[\"description\"][:60]} |')
          " >> $GITHUB_STEP_SUMMARY
          else
            CHECKED=$(cat ailock-audit.json | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('packages_checked', 0))" 2>/dev/null || echo "0")
            echo "### ✅ Audit — $CHECKED packages checked, 0 known-bad" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload ailock results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ailock-security-report
          path: |
            ailock-verify.json
            ailock-audit.json

      - name: Fail if tampered or known-bad
        run: |
          TAMPERED=$(cat ailock-verify.json | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('tampered', 0))" 2>/dev/null || echo "0")
          HITS=$(cat ailock-audit.json | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('hits', 0))" 2>/dev/null || echo "0")

          if [ "$TAMPERED" -gt "0" ] || [ "$HITS" -gt "0" ]; then
            echo "🚨 Supply chain attack detected! Blocking deployment."
            exit 1
          fi

          echo "✅ All checks passed."
